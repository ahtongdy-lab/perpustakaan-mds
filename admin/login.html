
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Login Admin</title>
<link rel="stylesheet" href="../css/style.css">
</head>
<body>

<header><h1>Login Admin</h1></header>

<div class="container">
<input type="password" id="pass" placeholder="Password Admin">
<button onclick="login()">Login</button>
<p id="msg"></p>
</div>

<footer>Hakcipta Majlis Daerah Simunjan 2026</footer>

<script>
function login(){
let p=document.getElementById("pass").value;
if(p==="mdsadmin"){
window.location="dashboard.html";
}else{
document.getElementById("msg").innerHTML="Password Salah";
}
}
</script>

</body>
</html>
